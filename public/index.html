<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/web-calendar-logo.png" />
  <link rel="stylesheet" href="/setup.css" />
  <title>Web Calendar – Setup</title>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>Web Calendar</h1>
      <p>Configure your calendar widget, preview it, and copy the embed snippet.</p>
    </div>

    <div class="layout">
      <!-- Settings panel -->
      <div class="settings">
        <h2>Settings</h2>

        <div class="field import-field">
          <label for="importSnippet">Import Existing Snippet</label>
          <textarea id="importSnippet" rows="3" placeholder='Paste an embed snippet here, e.g. &lt;div data-web-calendar data-url="..." ...&gt;&lt;/div&gt;'></textarea>
          <button class="btn-import" id="importBtn">Import Settings</button>
          <div class="import-ok" id="importOk">Settings imported!</div>
          <div class="import-err" id="importErr"></div>
        </div>

        <hr class="field-divider" />

        <div class="field">
          <label for="icsUrl">ICS Feed URL</label>
          <input id="icsUrl" type="url" placeholder="https://example.com/feed.ics" />
          <button class="btn-load" id="loadBtn" style="margin-top:0.5rem">Load Calendar</button>
        </div>

        <div class="field">
          <label>Accent Color</label>
          <div class="color-row">
            <input id="accentPicker" type="color" value="#4f6ef7" />
            <input id="accentHex" type="text" value="#4f6ef7" maxlength="7" />
          </div>
        </div>

        <hr class="field-divider" />

        <div class="field">
          <label>Background Color</label>
          <div class="color-row">
            <input id="bgPicker" type="color" value="#f8f9fa" />
            <input id="bgHex" type="text" value="#f8f9fa" maxlength="7" />
          </div>
        </div>

        <div class="field">
          <label>Text Color</label>
          <div class="color-row">
            <input id="textPicker" type="color" value="#1a202c" />
            <input id="textHex" type="text" value="#1a202c" maxlength="7" />
          </div>
        </div>

        <div class="field">
          <label>Card Color</label>
          <div class="color-row">
            <input id="cardPicker" type="color" value="#ffffff" />
            <input id="cardHex" type="text" value="#ffffff" maxlength="7" />
          </div>
        </div>

        <div class="field">
          <label>Border Radius</label>
          <div class="range-row">
            <input id="radiusSlider" type="range" min="0" max="24" value="10" />
            <span class="range-val" id="radiusVal">10px</span>
          </div>
        </div>

        <div class="field">
          <label for="viewSelect">Default View</label>
          <select id="viewSelect">
            <option value="week" selected>Week</option>
            <option value="day">Day</option>
            <option value="month">Month</option>
            <option value="next">Upcoming</option>
          </select>
        </div>

        <div class="field">
          <label for="langSelect">Language</label>
          <select id="langSelect">
            <option value="en" selected>English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Fran&ccedil;ais</option>
            <option value="it">Italiano</option>
            <option value="ru">Русский</option>
          </select>
        </div>

        <hr class="field-divider" />

        <div class="field">
          <label>Visible Controls</label>
          <div class="toggle-group">
            <label class="toggle-row">
              <input type="checkbox" id="showPrev" checked />
              <span>Prev Button</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="showToday" checked />
              <span>Today Button</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="showNext" checked />
              <span>Next Button</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="showViewSelect" checked />
              <span>View Selector</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="showSubscribe" checked />
              <span>Subscribe Button</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="showLabel" checked />
              <span>Date Label</span>
            </label>
          </div>
        </div>

        <div class="field" id="labelPosField">
          <label for="labelPosSelect">Date Label Position</label>
          <select id="labelPosSelect">
            <option value="right" selected>Right</option>
            <option value="left">Left</option>
          </select>
        </div>

        <hr class="field-divider" />

        <div class="field">
          <label>Google Maps</label>
          <div class="toggle-group">
            <label class="toggle-row">
              <input type="checkbox" id="showMaps" />
              <span>Show Map for Locations</span>
            </label>
          </div>
        </div>

        <div class="field" id="mapPosField" style="display:none">
          <label for="mapPosSelect">Map Position</label>
          <select id="mapPosSelect">
            <option value="auto" selected>Auto (adapts to space)</option>
            <option value="inline">Inline (inside event card)</option>
            <option value="above">Above events</option>
            <option value="below">Below events</option>
            <option value="left">Left side</option>
            <option value="right">Right side</option>
          </select>
        </div>

        <hr class="field-divider" />

        <div class="field">
          <label>Next Event Card</label>
          <div class="toggle-group">
            <label class="toggle-row">
              <input type="checkbox" id="nextCardFull" />
              <span>Full Width Card</span>
            </label>
          </div>
        </div>

      </div>

      <!-- Preview + snippet -->
      <div>
        <div class="preview-area">
          <h2>Preview</h2>
          <div id="preview"></div>
        </div>

        <div class="snippet-section">
          <h2>Embed Snippet</h2>
          <div class="snippet-wrap">
            <button class="btn-copy" id="copyBtn">Copy</button>
            <pre id="snippetCode"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="web-calendar.js"></script>
  <script src="lang/languages.js"></script>
  <script>
    var icsInput    = document.getElementById("icsUrl");
    var accentPick  = document.getElementById("accentPicker");
    var accentHex   = document.getElementById("accentHex");
    var bgPick      = document.getElementById("bgPicker");
    var bgHex       = document.getElementById("bgHex");
    var textPick    = document.getElementById("textPicker");
    var textHex     = document.getElementById("textHex");
    var cardPick    = document.getElementById("cardPicker");
    var cardHex     = document.getElementById("cardHex");
    var radiusSlider = document.getElementById("radiusSlider");
    var radiusVal   = document.getElementById("radiusVal");
    var viewSelect  = document.getElementById("viewSelect");
    var langSelect  = document.getElementById("langSelect");
    var loadBtn     = document.getElementById("loadBtn");
    var copyBtn     = document.getElementById("copyBtn");
    var snippetEl   = document.getElementById("snippetCode");
    var previewEl   = document.getElementById("preview");

    var showPrevCb     = document.getElementById("showPrev");
    var showTodayCb    = document.getElementById("showToday");
    var showNextCb     = document.getElementById("showNext");
    var showViewSelCb  = document.getElementById("showViewSelect");
    var showSubscribeCb = document.getElementById("showSubscribe");
    var showLabelCb    = document.getElementById("showLabel");
    var labelPosSelect = document.getElementById("labelPosSelect");
    var labelPosField  = document.getElementById("labelPosField");
    var showMapsCb     = document.getElementById("showMaps");
    var mapPosSelect   = document.getElementById("mapPosSelect");
    var mapPosField    = document.getElementById("mapPosField");
    var nextCardFullCb = document.getElementById("nextCardFull");

    var importArea  = document.getElementById("importSnippet");
    var importBtn   = document.getElementById("importBtn");
    var importOk    = document.getElementById("importOk");
    var importErr   = document.getElementById("importErr");

    var D = WebCalendar.DEFAULTS;
    var cal = null;

    function escHtml(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function val(hexInput, def) {
      return hexInput.value.trim() || def;
    }

    function isDefault(v, def) {
      return v.toLowerCase() === def.toLowerCase();
    }

    function scriptSrc() {
      var host = location.hostname;
      if (host === "localhost" || host === "127.0.0.1") return "https://your-server.com/web-calendar.js";
      return location.origin + "/web-calendar.js";
    }

    function langSrc() {
      var host = location.hostname;
      var base = (host === "localhost" || host === "127.0.0.1")
        ? "https://your-server.com" : location.origin;
      return base + "/lang/languages.js";
    }

    function updateSnippet() {
      var url = icsInput.value.trim();
      var accent = val(accentHex, D.accent);
      var bg = val(bgHex, D.bg);
      var tc = val(textHex, D.textColor);
      var cc = val(cardHex, D.cardColor);
      var r = radiusSlider.value;

      var vw = viewSelect.value;
      var ln = langSelect.value;

      var attrs = 'data-web-calendar';
      if (url)                    attrs += ' data-url="' + escHtml(url) + '"';
      if (!isDefault(vw, D.view))          attrs += ' data-view="' + escHtml(vw) + '"';
      if (!isDefault(ln, D.lang))          attrs += ' data-lang="' + escHtml(ln) + '"';
      if (!isDefault(accent, D.accent))     attrs += ' data-accent="' + escHtml(accent) + '"';
      if (!isDefault(bg, D.bg))             attrs += ' data-bg="' + escHtml(bg) + '"';
      if (!isDefault(tc, D.textColor))      attrs += ' data-text-color="' + escHtml(tc) + '"';
      if (!isDefault(cc, D.cardColor))      attrs += ' data-card-color="' + escHtml(cc) + '"';
      if (r !== D.radius)                   attrs += ' data-radius="' + escHtml(r) + '"';
      if (!showPrevCb.checked)              attrs += ' data-show-prev="false"';
      if (!showTodayCb.checked)             attrs += ' data-show-today="false"';
      if (!showNextCb.checked)              attrs += ' data-show-next="false"';
      if (!showViewSelCb.checked)           attrs += ' data-show-view-select="false"';
      if (!showSubscribeCb.checked)         attrs += ' data-show-subscribe="false"';
      if (!showLabelCb.checked)             attrs += ' data-show-label="false"';
      if (labelPosSelect.value !== D.labelPosition) attrs += ' data-label-position="' + escHtml(labelPosSelect.value) + '"';
      if (showMapsCb.checked)                     attrs += ' data-show-maps="true"';
      if (showMapsCb.checked && mapPosSelect.value !== D.mapPosition) attrs += ' data-map-position="' + escHtml(mapPosSelect.value) + '"';
      if (nextCardFullCb.checked)                attrs += ' data-next-card-full="true"';

      var langTag = '\n&lt;script src="' + escHtml(langSrc()) + '"&gt;&lt;/script&gt;';

      var snippet =
        '&lt;div ' + attrs + '&gt;&lt;/div&gt;\n' +
        '&lt;script src="' + escHtml(scriptSrc()) + '"&gt;&lt;/script&gt;' +
        langTag;

      snippetEl.innerHTML = snippet;
      updateUrl();
    }

    function updateUrl() {
      var p = new URLSearchParams();
      var url = icsInput.value.trim();
      var accent = val(accentHex, D.accent);
      var bg = val(bgHex, D.bg);
      var tc = val(textHex, D.textColor);
      var cc = val(cardHex, D.cardColor);
      var r = radiusSlider.value;
      var vw = viewSelect.value;
      var ln = langSelect.value;

      if (url) p.set("url", url);
      if (!isDefault(vw, D.view)) p.set("view", vw);
      if (!isDefault(ln, D.lang)) p.set("lang", ln);
      if (!isDefault(accent, D.accent)) p.set("accent", accent);
      if (!isDefault(bg, D.bg)) p.set("bg", bg);
      if (!isDefault(tc, D.textColor)) p.set("textColor", tc);
      if (!isDefault(cc, D.cardColor)) p.set("cardColor", cc);
      if (r !== D.radius) p.set("radius", r);
      if (!showPrevCb.checked) p.set("showPrev", "false");
      if (!showTodayCb.checked) p.set("showToday", "false");
      if (!showNextCb.checked) p.set("showNext", "false");
      if (!showViewSelCb.checked) p.set("showViewSelect", "false");
      if (!showSubscribeCb.checked) p.set("showSubscribe", "false");
      if (!showLabelCb.checked) p.set("showLabel", "false");
      if (labelPosSelect.value !== D.labelPosition) p.set("labelPosition", labelPosSelect.value);
      if (showMapsCb.checked) p.set("showMaps", "true");
      if (showMapsCb.checked && mapPosSelect.value !== D.mapPosition) p.set("mapPosition", mapPosSelect.value);
      if (nextCardFullCb.checked) p.set("nextCardFull", "true");

      var qs = p.toString();
      var newUrl = location.pathname + (qs ? "?" + qs : "");
      history.replaceState(null, "", newUrl);
    }

    function initPreview() {
      previewEl.innerHTML = "";
      cal = new WebCalendar(previewEl, {
        accent: val(accentHex, D.accent),
        bg: val(bgHex, D.bg),
        textColor: val(textHex, D.textColor),
        cardColor: val(cardHex, D.cardColor),
        radius: radiusSlider.value,
        view: viewSelect.value,
        lang: langSelect.value,
        noInput: true,
        showPrev: showPrevCb.checked,
        showToday: showTodayCb.checked,
        showNext: showNextCb.checked,
        showViewSelect: showViewSelCb.checked,
        showSubscribe: showSubscribeCb.checked,
        showLabel: showLabelCb.checked,
        labelPosition: labelPosSelect.value,
        showMaps: showMapsCb.checked,
        mapPosition: mapPosSelect.value,
        nextCardFull: nextCardFullCb.checked
      });
      updateSnippet();
    }

    function loadFeed() {
      var url = icsInput.value.trim();
      if (!url || !cal) return;
      cal.loadFeed(url);
      updateSnippet();
    }

    function syncPageAccent(color) {
      document.documentElement.style.setProperty("--cfg-accent", color);
    }

    function bindColorPair(picker, hex, optionKey) {
      picker.addEventListener("input", function () {
        hex.value = this.value;
        if (cal) cal.setOption(optionKey, this.value);
        if (optionKey === "accent") syncPageAccent(this.value);
        updateSnippet();
      });
      hex.addEventListener("input", function () {
        var v = this.value.trim();
        if (/^#[0-9a-f]{6}$/i.test(v)) {
          picker.value = v;
          if (cal) cal.setOption(optionKey, v);
          if (optionKey === "accent") syncPageAccent(v);
        }
        updateSnippet();
      });
    }

    bindColorPair(accentPick, accentHex, "accent");
    bindColorPair(bgPick, bgHex, "bg");
    bindColorPair(textPick, textHex, "textColor");
    bindColorPair(cardPick, cardHex, "cardColor");

    radiusSlider.addEventListener("input", function () {
      radiusVal.textContent = this.value + "px";
      if (cal) cal.setOption("radius", this.value);
      updateSnippet();
    });

    viewSelect.addEventListener("change", function () {
      if (cal) cal.setOption("view", this.value);
      updateSnippet();
    });

    langSelect.addEventListener("change", function () {
      if (cal) cal.setOption("lang", this.value);
      updateSnippet();
    });

    function bindToggle(cb, key) {
      cb.addEventListener("change", function () {
        if (cal) cal.setOption(key, this.checked);
        updateSnippet();
      });
    }
    bindToggle(showPrevCb, "showPrev");
    bindToggle(showTodayCb, "showToday");
    bindToggle(showNextCb, "showNext");
    bindToggle(showViewSelCb, "showViewSelect");
    bindToggle(showSubscribeCb, "showSubscribe");

    showLabelCb.addEventListener("change", function () {
      if (cal) cal.setOption("showLabel", this.checked);
      labelPosField.style.display = this.checked ? "" : "none";
      updateSnippet();
    });

    labelPosSelect.addEventListener("change", function () {
      if (cal) cal.setOption("labelPosition", this.value);
      updateSnippet();
    });

    showMapsCb.addEventListener("change", function () {
      if (cal) cal.setOption("showMaps", this.checked);
      mapPosField.style.display = this.checked ? "" : "none";
      updateSnippet();
    });

    mapPosSelect.addEventListener("change", function () {
      if (cal) cal.setOption("mapPosition", this.value);
      updateSnippet();
    });

    nextCardFullCb.addEventListener("change", function () {
      if (cal) cal.setOption("nextCardFull", this.checked);
      updateSnippet();
    });

    icsInput.addEventListener("input", updateSnippet);
    loadBtn.addEventListener("click", loadFeed);
    icsInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") loadFeed();
    });

    copyBtn.addEventListener("click", function () {
      var text = snippetEl.textContent;
      navigator.clipboard.writeText(text).then(function () {
        copyBtn.textContent = "Copied!";
        setTimeout(function () { copyBtn.textContent = "Copy"; }, 1500);
      });
    });

    function flashImport(ok, msg) {
      importOk.style.display = "none";
      importErr.style.display = "none";
      if (ok) {
        importOk.textContent = msg || "Settings imported!";
        importOk.style.display = "block";
      } else {
        importErr.textContent = msg || "Could not parse snippet.";
        importErr.style.display = "block";
      }
      setTimeout(function () {
        importOk.style.display = "none";
        importErr.style.display = "none";
      }, 3000);
    }

    function importSnippet() {
      var raw = importArea.value.trim();
      if (!raw) { flashImport(false, "Paste an embed snippet first."); return; }

      var tmp = document.createElement("div");
      tmp.innerHTML = raw;
      var el = tmp.querySelector("[data-web-calendar]");
      if (!el) {
        flashImport(false, "No data-web-calendar element found in snippet.");
        return;
      }

      var url = el.getAttribute("data-url") || "";
      var accent = el.getAttribute("data-accent") || "";
      var bg = el.getAttribute("data-bg") || "";
      var textColor = el.getAttribute("data-text-color") || "";
      var cardColor = el.getAttribute("data-card-color") || "";
      var radius = el.getAttribute("data-radius");
      var view = el.getAttribute("data-view") || "";
      var lang = el.getAttribute("data-lang") || "";

      if (url) icsInput.value = url;
      if (accent && /^#[0-9a-f]{3,6}$/i.test(accent)) {
        accentHex.value = accent; accentPick.value = accent;
        syncPageAccent(accent);
      }
      if (bg && /^#[0-9a-f]{3,6}$/i.test(bg)) {
        bgHex.value = bg; bgPick.value = bg;
      }
      if (textColor && /^#[0-9a-f]{3,6}$/i.test(textColor)) {
        textHex.value = textColor; textPick.value = textColor;
      }
      if (cardColor && /^#[0-9a-f]{3,6}$/i.test(cardColor)) {
        cardHex.value = cardColor; cardPick.value = cardColor;
      }
      if (radius != null && radius !== "") {
        radiusSlider.value = radius;
        radiusVal.textContent = radius + "px";
      }
      if (view && ["day","week","month","next"].indexOf(view) >= 0) {
        viewSelect.value = view;
      }
      if (lang) {
        for (var i = 0; i < langSelect.options.length; i++) {
          if (langSelect.options[i].value === lang) { langSelect.value = lang; break; }
        }
      }

      var sp = el.getAttribute("data-show-prev");
      var st = el.getAttribute("data-show-today");
      var sn = el.getAttribute("data-show-next");
      var sv = el.getAttribute("data-show-view-select");
      var ss = el.getAttribute("data-show-subscribe");
      showPrevCb.checked = sp !== "false";
      showTodayCb.checked = st !== "false";
      showNextCb.checked = sn !== "false";
      showViewSelCb.checked = sv !== "false";
      showSubscribeCb.checked = ss !== "false";

      var sl = el.getAttribute("data-show-label");
      var lp = el.getAttribute("data-label-position") || "";
      showLabelCb.checked = sl !== "false";
      if (lp && (lp === "left" || lp === "right")) labelPosSelect.value = lp;
      labelPosField.style.display = showLabelCb.checked ? "" : "none";

      var sm = el.getAttribute("data-show-maps");
      var mp = el.getAttribute("data-map-position") || "";
      showMapsCb.checked = sm === "true";
      if (mp && ["auto","inline","above","below","left","right"].indexOf(mp) >= 0) mapPosSelect.value = mp;
      mapPosField.style.display = showMapsCb.checked ? "" : "none";

      var ncf = el.getAttribute("data-next-card-full");
      nextCardFullCb.checked = ncf === "true";

      initPreview();
      if (url) loadFeed();
      flashImport(true);
    }

    importBtn.addEventListener("click", importSnippet);

    (function loadFromUrl() {
      var p = new URLSearchParams(location.search);
      if (p.toString() === "") return;

      var url = p.get("url");
      var accent = p.get("accent");
      var bg = p.get("bg");
      var tc = p.get("textColor");
      var cc = p.get("cardColor");
      var r = p.get("radius");
      var vw = p.get("view");
      var ln = p.get("lang");

      if (url) icsInput.value = url;
      if (accent && /^#[0-9a-f]{3,6}$/i.test(accent)) {
        accentHex.value = accent; accentPick.value = accent;
        syncPageAccent(accent);
      }
      if (bg && /^#[0-9a-f]{3,6}$/i.test(bg)) {
        bgHex.value = bg; bgPick.value = bg;
      }
      if (tc && /^#[0-9a-f]{3,6}$/i.test(tc)) {
        textHex.value = tc; textPick.value = tc;
      }
      if (cc && /^#[0-9a-f]{3,6}$/i.test(cc)) {
        cardHex.value = cc; cardPick.value = cc;
      }
      if (r != null && r !== "") {
        radiusSlider.value = r;
        radiusVal.textContent = r + "px";
      }
      if (vw && ["day","week","month","next"].indexOf(vw) >= 0) {
        viewSelect.value = vw;
      }
      if (ln) {
        for (var i = 0; i < langSelect.options.length; i++) {
          if (langSelect.options[i].value === ln) { langSelect.value = ln; break; }
        }
      }

      if (p.get("showPrev") === "false") showPrevCb.checked = false;
      if (p.get("showToday") === "false") showTodayCb.checked = false;
      if (p.get("showNext") === "false") showNextCb.checked = false;
      if (p.get("showViewSelect") === "false") showViewSelCb.checked = false;
      if (p.get("showSubscribe") === "false") showSubscribeCb.checked = false;

      var sl = p.get("showLabel");
      if (sl === "false") showLabelCb.checked = false;
      var lp = p.get("labelPosition");
      if (lp && (lp === "left" || lp === "right")) labelPosSelect.value = lp;
      labelPosField.style.display = showLabelCb.checked ? "" : "none";

      if (p.get("showMaps") === "true") showMapsCb.checked = true;
      var mp = p.get("mapPosition");
      if (mp && ["auto","inline","above","below","left","right"].indexOf(mp) >= 0) mapPosSelect.value = mp;
      mapPosField.style.display = showMapsCb.checked ? "" : "none";

      if (p.get("nextCardFull") === "true") nextCardFullCb.checked = true;

      initPreview();
      if (url) loadFeed();
    })();

    if (!location.search) initPreview();
  </script>
</body>
</html>
